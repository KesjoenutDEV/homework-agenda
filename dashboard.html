<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homework Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <h2 data-text="dashboardTitle">📚 Homework Planner</h2>
  <div>
    <button onclick="toggleTheme()" data-text="themeBtn">🌙 / ☀️</button>
    <button onclick="exportSave()" data-text="exportBtn">Export Save</button>
    <input type="file" id="importFile" onchange="importSave(this.files[0])">
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="addTask">
    <h3 data-text="addHomework">Add Homework / Exam</h3>
    <input id="day" type="date" placeholder="Date">
    <input id="subject" placeholder="Subject">
    <input id="task" placeholder="Task description">
    <input id="num" type="text" placeholder="Assignments (comma-separated)">
    <input id="examWeight" type="number" placeholder="Exam Weight (%)">
    <input id="studyDate" type="date" placeholder="Study Date">
    <button onclick="addTask()">Add</button>
  </div>

  <div class="tasks">
    <h3 data-text="yourTasks">Your Tasks</h3>
    <div id="taskList"></div>
  </div>
</div>

<script src="js/dashboard.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
