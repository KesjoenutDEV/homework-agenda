<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Homework Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="light">

<div class="login-card">
  <h1 data-text="loginTitle">Homework Planner</h1>

  <input id="user" placeholder="Username" data-text="username">
  <input id="pass" type="password" placeholder="Password" data-text="password">

  <button onclick="login()" data-text="loginBtn">Login</button>
  <button onclick="register()" data-text="createBtn">Create Account</button>

  <br><br>
  <label data-text="languageLabel">Language:</label>
  <select id="language" onchange="setLanguage(this.value)">
    <option value="en">English</option>
    <option value="nl">Nederlands</option>
  </select>

  <br><br>
  <button onclick="toggleTheme()">🌙 / ☀️</button>
</div>

<script src="js/auth.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
